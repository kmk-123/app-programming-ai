name: Deploy WBS to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y chromium-browser poppler-utils

      - name: Render WBS to PDF
        run: |
          chromium-browser --headless --no-sandbox \
            --print-to-pdf=docs/wbs.pdf \
            --print-to-pdf-no-header \
            file://$(pwd)/docs/index.html

      - name: Append WBS to presentation PDF
        run: |
          pdfunite docs/presentation.pdf docs/wbs.pdf docs/combined.pdf
          mv docs/combined.pdf docs/presentation.pdf
          rm docs/wbs.pdf

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
