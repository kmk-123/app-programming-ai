name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: EAS Build (preview APK)
        working-directory: app
        run: eas build --platform android --profile preview --non-interactive --wait

      - name: Get APK download URL
        working-directory: app
        run: |
          BUILD_JSON=$(eas build:list --platform android --limit 1 --json 2>/dev/null) || BUILD_JSON='[]'
          APK_URL=$(echo "$BUILD_JSON" | jq -r '.[0].artifacts.applicationArchiveUrl // empty')
          if [ -z "$APK_URL" ]; then
            echo "ERROR: APK URL not found" && exit 1
          fi
          echo "APK_URL=$APK_URL" >> "$GITHUB_ENV"

      - name: Download APK
        run: wget -q -O schedule-app.apk "$APK_URL"

      - name: Update GitHub Release (latest)
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git tag -f latest
          git push origin latest --force
          gh release create latest schedule-app.apk \
            --title "친구 스케줄 매칭 — 최신 빌드" \
            --notes "$(cat <<'NOTES'
## 설치 방법

1. 아래 **schedule-app.apk** 파일을 다운로드합니다.
2. Android 기기에서 파일을 열어 설치합니다.
   - 처음 설치 시 **설정 → 알 수 없는 앱 허용** 이 필요합니다.

> `main` 브랜치에 푸시될 때마다 자동으로 최신 빌드로 갱신됩니다.
NOTES
)" \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
